      <h1>Autozon — Fair Value Car Trading</h1>
      <p>Autozon is an AI-powered car marketplace that helps you buy and sell cars at fair prices. Get instant AI valuations, verified buyer matching, and a seamless transaction experience — no hidden fees, no middlemen.</p>
      <h2>How It Works</h2>
      <ul>
        <li><strong>Sellers:</strong> Upload your car, get an AI-powered fair value appraisal, and connect with verified buyers. One-time listing fee of €9.99 (private) or €19.99 (dealer).</li>

      </ul>

      <ul>
        <li>AI-powered fair value appraisals using real market data</li>
        <li>Smart buyer-car matching based on lifestyle and preferences</li>
        <li>Guided negotiation with fair price corridors</li>
        <li>Full transaction management: contracts, payments, insurance</li>
        <li>KYC verification for trust and safety</li>
        <li>Built-in AI assistant (Zoni) for guidance at every step</li>
      </ul>
      <h2>Pricing</h2>
      <p>Private sellers: €9.99 one-time listing fee. Business/dealers: €19.99 one-time listing fee. Buyers: FREE. No subscriptions, no monthly fees.</p>
